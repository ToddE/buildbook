# ==========================================
# buildbook-8-5x11.conf - Letter/Magazine
# ==========================================

# --- PDF Page Layout ---
TRIM_SIZE="8.5x11"
PAPER_W="8.5in"
PAPER_H="11in"
MARGIN_TOP="1in"
MARGIN_BOT="1in"
MARGIN_LEFT="1in"
MARGIN_RIGHT="1in"

# --- Typography ---
FONT_SIZE="12pt"
LINE_SPACING="1.4"
MAIN_FONT="Linux Libertine O"
MONO_FONT="DejaVu Sans Mono"
PARAGRAPH_STYLE="block"

# --- Page Headers & Footers ---
HEADER_EVEN_LEFT="\thepage"
HEADER_EVEN_RIGHT="\leftmark"
HEADER_ODD_LEFT="\rightmark"
HEADER_ODD_RIGHT="\thepage"
HEADER_RULE_WIDTH="0.5pt"

# --- Structural Breaks ---
PART_BREAK="any"
CHAPTER_BREAK="any"
PART_PAGE_PLAIN="false"
CHAPTER_PAGE_PLAIN="false"

# --- External Style Files ---
LATEX_STYLES_FILE="examples/styles/styles.tex"
EPUB_STYLESHEET="examples/styles/style-8-5x11.css"

# --- EPUB Specifics ---
EPUB_TOC_DEPTH="2"
EPUB_SPLIT_LEVEL="1"