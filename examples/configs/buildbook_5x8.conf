# ==========================================
# buildbook-5x8.conf - Pocket/Compact Novel
# ==========================================

# --- PDF Page Layout ---
TRIM_SIZE="5x8"
PAPER_W="5in"
PAPER_H="8in"
MARGIN_TOP="0.6in"
MARGIN_BOT="0.6in"
MARGIN_LEFT="0.625in" # Slightly larger gutter for tight pocket binding
MARGIN_RIGHT="0.5in"

# --- Typography ---
FONT_SIZE="10pt"      # Smaller font for smaller canvas
LINE_SPACING="1.1"
MAIN_FONT="Linux Libertine O"
MONO_FONT="DejaVu Sans Mono"
PARAGRAPH_STYLE="indent"

# --- Page Headers & Footers ---
HEADER_EVEN_LEFT="\thepage"
HEADER_EVEN_RIGHT="\textit{\leftmark}"
HEADER_ODD_LEFT="\textit{\rightmark}"
HEADER_ODD_RIGHT="\thepage"
HEADER_RULE_WIDTH="0.4pt"

# --- Structural Breaks ---
PART_BREAK="left"     
CHAPTER_BREAK="right" 
PART_PAGE_PLAIN="true"
CHAPTER_PAGE_PLAIN="true"

# --- EPUB Specifics ---
EPUB_STYLESHEET="style-5x8.css"
EPUB_TOC_DEPTH="2"
EPUB_SPLIT_LEVEL="2"