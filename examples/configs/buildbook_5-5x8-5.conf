# ==========================================
# buildbook-5-5x8-5.conf - Digest/Trade Novel
# ==========================================

# --- PDF Page Layout ---
TRIM_SIZE="5.5x8.5"
PAPER_W="5.5in"
PAPER_H="8.5in"
MARGIN_TOP="0.75in"
MARGIN_BOT="0.75in"
MARGIN_LEFT="0.75in"
MARGIN_RIGHT="0.5in"

# --- Typography ---
FONT_SIZE="11pt"
LINE_SPACING="1.2"
MAIN_FONT="Linux Libertine O"
MONO_FONT="DejaVu Sans Mono"
PARAGRAPH_STYLE="indent"

# --- Page Headers & Footers ---
HEADER_EVEN_LEFT="\thepage"
HEADER_EVEN_RIGHT="\textit{\leftmark}"
HEADER_ODD_LEFT="\textit{\rightmark}"
HEADER_ODD_RIGHT="\thepage"
HEADER_RULE_WIDTH="0.4pt"

# --- Structural Breaks ---
PART_BREAK="right"
CHAPTER_BREAK="right"
PART_PAGE_PLAIN="true"
CHAPTER_PAGE_PLAIN="true"

# --- External Style Files ---
LATEX_STYLES_FILE="examples/styles/styles.tex"
EPUB_STYLESHEET="examples/styles/style-5-5x8-5.css"

# --- EPUB Specifics ---
EPUB_TOC_DEPTH="2"
EPUB_SPLIT_LEVEL="2"