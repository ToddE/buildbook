# ==========================================
# buildbook_7x10.conf - Technical/Manual
# ==========================================

# --- PDF Page Layout ---
TRIM_SIZE="7x10"
PAPER_W="7in"
PAPER_H="10in"
MARGIN_TOP="1in"
MARGIN_BOT="1in"
MARGIN_LEFT="1in"
MARGIN_RIGHT="0.75in"

# --- Typography ---
FONT_SIZE="11pt"
LINE_SPACING="1.3"
MAIN_FONT="Linux Libertine O"
MONO_FONT="DejaVu Sans Mono"
PARAGRAPH_STYLE="block" # Common for technical docs

# --- Page Headers & Footers ---
HEADER_EVEN_LEFT="\thepage"
HEADER_EVEN_RIGHT="\leftmark"
HEADER_ODD_LEFT="\rightmark"
HEADER_ODD_RIGHT="\thepage"
HEADER_RULE_WIDTH="0.5pt"

# --- Structural Breaks ---
PART_BREAK="any"    # Manuals often don't force left/right
CHAPTER_BREAK="any"
PART_PAGE_PLAIN="true"
CHAPTER_PAGE_PLAIN="false"

# --- EPUB Specifics ---
EPUB_STYLESHEET="style_7x10.css"
EPUB_TOC_DEPTH="3"   # Deeper TOC for technical content
EPUB_SPLIT_LEVEL="2"