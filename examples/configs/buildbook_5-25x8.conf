# ==========================================
# buildbook-5-25x8.conf - Custom Novel Size
# ==========================================

# --- PDF Page Layout ---
TRIM_SIZE="5.25x8"
PAPER_W="5.25in"
PAPER_H="8in"
MARGIN_TOP="0.7in"
MARGIN_BOT="0.7in"
MARGIN_LEFT="0.75in"  # Inside margin/gutter
MARGIN_RIGHT="0.5in"  # Outside margin

# --- Typography ---
FONT_SIZE="10.5pt"    # Adjusted for the specific 5.25 width
LINE_SPACING="1.2"
MAIN_FONT="Linux Libertine O"
MONO_FONT="DejaVu Sans Mono"
PARAGRAPH_STYLE="indent" 

# --- Page Headers & Footers ---
HEADER_EVEN_LEFT="\thepage"
HEADER_EVEN_RIGHT="\textit{\leftmark}"
HEADER_ODD_LEFT="\textit{\rightmark}"
HEADER_ODD_RIGHT="\thepage"
HEADER_RULE_WIDTH="0.4pt"

# --- Structural Breaks ---
PART_BREAK="left"     
CHAPTER_BREAK="right" 
PART_PAGE_PLAIN="true"
CHAPTER_PAGE_PLAIN="true"

# --- EPUB Specifics ---
EPUB_STYLESHEET="style-5-25x8.css"
EPUB_TOC_DEPTH="2"
EPUB_SPLIT_LEVEL="2"