# ==========================================
# buildbook.conf - Master Layout & Style Config
# ==========================================

# --- PDF Page Layout ---
TRIM_SIZE="6x9"
PAPER_W="6in"
PAPER_H="9in"
MARGIN_TOP="0.75in"
MARGIN_BOT="0.75in"
MARGIN_LEFT="0.75in"  # Inside margin/gutter (KDP recommendation varies by page count)
MARGIN_RIGHT="0.5in"  # Outside margin

# --- Typography ---
FONT_SIZE="11pt"
LINE_SPACING="1.15"
MAIN_FONT="Linux Libertine O"
MONO_FONT="DejaVu Sans Mono"
PARAGRAPH_STYLE="block"  # Options: 'block' (spaced) or 'indent' (novel style)

# --- Page Headers & Footers ---
# \leftmark  = Top-level heading (#)
# \rightmark = Second-level heading (##)
# \thepage   = Page number
HEADER_EVEN_LEFT="\thepage"
HEADER_EVEN_RIGHT="\textit{\leftmark}"
HEADER_ODD_LEFT="\textit{\rightmark}"
HEADER_ODD_RIGHT="\thepage"
HEADER_RULE_WIDTH="0.4pt"

# --- Structural Breaks ---
# Options: 'right' (odd page), 'left' (even page), or 'any' (next available)
PART_BREAK="left"     
CHAPTER_BREAK="right" 

# Use 'plain' page style (no headers/footers) on opening pages?
PART_PAGE_PLAIN="true"
CHAPTER_PAGE_PLAIN="true"

# --- External Style Files ---
# These files allow you to add custom ::: {.style} definitions 
# without editing the main buildbook.sh script.
LATEX_STYLES_FILE="styles.tex"
EPUB_STYLESHEET="style.css"

# --- EPUB Specifics ---
EPUB_TOC_DEPTH="2"
EPUB_SPLIT_LEVEL="2"